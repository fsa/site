- date: 2026-07-05
  text: На сайте появился раздел с рецептами.
  link: /eda/

- date: 2026-06-24
  text: Теперь вместо NextJS версии используется сборка через Hugo.

- date: 2025-08-14
  text: Сайт переезжает на tavda.org.
  link: https://tavda.org

- date: 2023-02-06
  text: У сайта появилось полноценное независимое зеркало на домене tavda.org. Копия сайта там располагалась и ранее, но она была зависима от основного сайта.

- date: 2022-10-24
  text: Начал создавать документацию для своего PHP фреймворка Neuron. Создан соответствующий раздел на сайте.
  link: /neuron/

- date: 2022-02-12
  text: Объединил сайт и блог. Домен blog.tavda.net больше не используется. Все статьи, ранее доступные на blog.tavda.net, теперь доступны по аналогичным адресам на tavda.net.

- date: 2018-07-15
  text: "Система умного дома достигла того состояния, что базовый функционал реализуется без необходимости внесения изменений в базу данных вручную."
  link: /shcc/

- date: 2018-05-31
  text: Начал работать над системой умного дома на языке PHP. Текущий исходный код доступен на Github.
  link: https://github.com/fsa/shcc

- date: 2017-08-16
  text: "Разместил приложение «Гидравлический расчёт трубопроводов» в Google Play. Исходный код расчётной части на Github."
  links:
