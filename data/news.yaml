- date: 2012-07-25
  text: "Выложил модифицированную версию приложения KeypadMapper2. P.S. 06.03.2013. Вышел оригинальный Keypad-Mapper версии 3, значительно переработанный. Так что, в этой версии, необходимость отпала. Скачать можно из Google Play."

- date: 2012-04-16
  text: Добавил в раздел «Скачать» инструкцию по настройке ADSL соединения для Windows 7.

- date: 2011-10-24
  text: Вернулся к старому дизайну сайта. Блог перенёс на сервис Blogger.

- date: 2010-05-15
  text: Неожиданно обнаружил что сайт до сих пор был в CP1251. Надо ж было так запустить. Конечно перекодировал сайт в UTF-8 для удобства и красоты, за одно начал подготовку к смене дизайна.

- date: 2008-09-10
  text: Добавил в раздел «Скачать» инструкцию по настройке ADSL соединения для Windows XP. Описаны элементарные вещи, но люди всякие бывают.
