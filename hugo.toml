baseURL = "https://tavda.org"
locale = "ru-RU"
title = "Сайт FSA"
timezone = "Asia/Novosibirsk"
uglyURLs = false
enableRobotsTXT = true

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^GITHUB_ACTIONS$']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "sitemap"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[params]
  description = "Это мой персональный сайт"
  author = "Сергей Федотов (FSA)"
